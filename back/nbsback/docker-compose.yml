version: '3.8'

services:
  springboot:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: springboot_nbs
      ports:
        - "8080:8080"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nbs_database
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres
      depends_on:
        - postgres
  postgres:
    image: postgres:15
    container_name: postgres_nbs
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nbs_database
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

